# ================================================================
#  compose.apps.yml — Application Layer
#  Builds the bundled rclone OAuth Manager from ./services/app
#
#  Subdomain: ${RCLONE_MANAGER_PROJECT_NAME}.${RCLONE_MANAGER_DOMAIN}
#
#  Minimal required env:
#    RCLONE_MANAGER_APP_PORT   — Port app listens on inside container
#    RCLONE_MANAGER_PROJECT_NAME, RCLONE_MANAGER_DOMAIN, RCLONE_MANAGER_CADDY_AUTH_USER, RCLONE_MANAGER_CADDY_AUTH_HASH
# ================================================================

services:
  app:
    image: "${RCLONE_MANAGER_PROJECT_NAME:-myapp}-app:local"
    container_name: "main-app"
    build:
      context: ./services/app
      dockerfile: Dockerfile
    # Pass deployment-specific app secrets such as Firebase credentials.
    # Explicit values below still override env_file values.
    env_file:
      - ./.env
    environment:
      RCLONE_MANAGER_NODE_ENV: "${RCLONE_MANAGER_NODE_ENV:-production}"
      RCLONE_MANAGER_PORT: "${RCLONE_MANAGER_APP_PORT:-53682}"
      RCLONE_MANAGER_FRONTEND_URL: "${RCLONE_MANAGER_FRONTEND_URL:-}"
      RCLONE_MANAGER_ALLOWED_ORIGINS: "${RCLONE_MANAGER_ALLOWED_ORIGINS:-}"
      RCLONE_MANAGER_RCLONE_MOUNT_ROOT: "${RCLONE_MANAGER_RCLONE_MOUNT_ROOT:-/mnt/docker-volumes}"
      RCLONE_MANAGER_FILEBROWSER_PUBLIC_URL: "${RCLONE_MANAGER_FILEBROWSER_PUBLIC_URL:-}"
    ports:
      - "127.0.0.1:${RCLONE_MANAGER_APP_HOST_PORT:-53682}:${RCLONE_MANAGER_APP_PORT:-53682}"
    volumes:
      - ${RCLONE_MANAGER_DOCKER_VOLUMES_ROOT:-./.docker-volumes}/app/logs:/app/logs
      - ${RCLONE_MANAGER_DOCKER_VOLUMES_ROOT:-./.docker-volumes}/app/data:/data
      - type: bind
        source: ${RCLONE_MANAGER_DOCKER_VOLUMES_ROOT:-./.docker-volumes}
        target: /mnt/docker-volumes
        bind:
          propagation: rshared
    devices:
      - "/dev/fuse:/dev/fuse"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    labels:
      # Public HTTP sites behind Cloudflare Tunnel.
      - "caddy=http://${RCLONE_MANAGER_PROJECT_NAME}.${RCLONE_MANAGER_DOMAIN}, http://main.${RCLONE_MANAGER_DOMAIN}, http://${RCLONE_MANAGER_DOMAIN}, http://${RCLONE_MANAGER_PROJECT_NAME_TAILSCALE}.${RCLONE_MANAGER_TAILSCALE_TAILNET_DOMAIN}"
      - "caddy.reverse_proxy={{upstreams ${RCLONE_MANAGER_APP_PORT:-53682}}}"
      # Internal HTTPS site for Tailscale / trusted LAN access.
      - "caddy_1=https://${RCLONE_MANAGER_PROJECT_NAME_TAILSCALE:-myapp}.${RCLONE_MANAGER_TAILSCALE_TAILNET_DOMAIN:-tailnet.local}"
      - "caddy_1.tls=internal"
      - "caddy_1.reverse_proxy={{upstreams ${RCLONE_MANAGER_APP_PORT:-53682}}}"
    networks: [app_net]
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "sh"
        - "-c"
        - "wget -qO- http://localhost:${RCLONE_MANAGER_APP_PORT:-53682}${RCLONE_MANAGER_HEALTH_PATH:-/health} || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
