# ================================================================
#  compose.access.yml — Network Access Layer
#  Tailscale VPN — private mesh for internal team access
#
#  Profiles:
#    tailscale-linux   — kernel TUN mode (full features, Linux host)
#    tailscale-windows — userspace mode (Windows/WSL2 host)
#
#  Required env (when RCLONE_MANAGER_ENABLE_TAILSCALE=true):
#    RCLONE_MANAGER_TAILSCALE_AUTHKEY, RCLONE_MANAGER_TAILSCALE_TAGS
#  Optional keep-ip env:
#    RCLONE_MANAGER_TAILSCALE_KEEP_IP_ENABLE, RCLONE_MANAGER_TAILSCALE_KEEP_IP_FIREBASE_URL (state+certs),
#    RCLONE_MANAGER_TAILSCALE_KEEP_IP_CERTS_DIR, RCLONE_MANAGER_TAILSCALE_KEEP_IP_REMOVE_HOSTNAME_ENABLE,
#    RCLONE_MANAGER_TAILSCALE_KEEP_IP_INTERVAL_SEC,
#    RCLONE_MANAGER_TAILSCALE_CLIENTID
# ================================================================

services:
  # ── Keep IP prepare (Linux profile): optional restore + optional remove hostname ──
  tailscale-keep-ip-prepare-linux:
    profiles: [tailscale-linux]
    image: node:20-alpine
    container_name: "ts-keep-ip-prepare-linux"
    command: ["node", "/workspace/tailscale/tailscale-keep-ip.js", "prepare"]
    # Compose vẫn ưu tiên giá trị khai báo explicit trong environment bên dưới.
    env_file:
      - ./.env
    environment:
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_ENABLE: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_ENABLE:-false}"
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_REMOVE_HOSTNAME_ENABLE: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_REMOVE_HOSTNAME_ENABLE:-}"
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_FIREBASE_URL: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_FIREBASE_URL:-}"
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_STATE_FILE: /var/lib/tailscale/tailscaled.state
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_CERTS_DIR: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_CERTS_DIR:-/var/lib/tailscale/certs}"
      RCLONE_MANAGER_PROJECT_NAME: "${RCLONE_MANAGER_PROJECT_NAME_TAILSCALE:-${RCLONE_MANAGER_PROJECT_NAME:-myapp}}"
      RCLONE_MANAGER_TAILSCALE_TS_TAILNET: "${RCLONE_MANAGER_TAILSCALE_TS_TAILNET:--}"
      RCLONE_MANAGER_TAILSCALE_AUTHKEY: "${RCLONE_MANAGER_TAILSCALE_AUTHKEY:-}"
      RCLONE_MANAGER_TAILSCALE_CLIENTID: "${RCLONE_MANAGER_TAILSCALE_CLIENTID:-}"
    user: "0:0"
    volumes:
      - ${RCLONE_MANAGER_DOCKER_VOLUMES_ROOT:-./.docker-volumes}/tailscale/var-lib:/var/lib/tailscale
      - ./tailscale:/workspace/tailscale
    networks: [app_net]
    restart: "no"

  # ── Keep IP prepare (Windows profile): optional restore + optional remove hostname ─
  tailscale-keep-ip-prepare-windows:
    profiles: [tailscale-windows]
    image: node:20-alpine
    container_name: "ts-keep-ip-prepare-windows"
    command: ["node", "/workspace/tailscale/tailscale-keep-ip.js", "prepare"]
    # Compose vẫn ưu tiên giá trị khai báo explicit trong environment bên dưới.
    env_file:
      - ./.env
    environment:
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_ENABLE: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_ENABLE:-false}"
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_REMOVE_HOSTNAME_ENABLE: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_REMOVE_HOSTNAME_ENABLE:-}"
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_FIREBASE_URL: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_FIREBASE_URL:-}"
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_STATE_FILE: /var/lib/tailscale/tailscaled.state
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_CERTS_DIR: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_CERTS_DIR:-/var/lib/tailscale/certs}"
      RCLONE_MANAGER_PROJECT_NAME: "${RCLONE_MANAGER_PROJECT_NAME_TAILSCALE:-${RCLONE_MANAGER_PROJECT_NAME:-myapp}}"
      RCLONE_MANAGER_TAILSCALE_TS_TAILNET: "${RCLONE_MANAGER_TAILSCALE_TS_TAILNET:--}"
      RCLONE_MANAGER_TAILSCALE_AUTHKEY: "${RCLONE_MANAGER_TAILSCALE_AUTHKEY:-}"
      RCLONE_MANAGER_TAILSCALE_CLIENTID: "${RCLONE_MANAGER_TAILSCALE_CLIENTID:-}"
    user: "0:0"
    volumes:
      - ${RCLONE_MANAGER_DOCKER_VOLUMES_ROOT:-./.docker-volumes}/tailscale/var-lib:/var/lib/tailscale
      - ./tailscale:/workspace/tailscale
    networks: [app_net]
    restart: "no"

  # ── Tailscale: Linux kernel mode (NET_ADMIN + TUN) ─────────────
  tailscale-linux:
    profiles: [tailscale-linux]
    image: tailscale/tailscale:stable
    container_name: "ts-linux"
    hostname: "${RCLONE_MANAGER_PROJECT_NAME_TAILSCALE:-${RCLONE_MANAGER_PROJECT_NAME:-myapp}}"
    depends_on:
      tailscale-keep-ip-prepare-linux:
        condition: service_completed_successfully
    # Compose vẫn ưu tiên giá trị khai báo explicit trong environment bên dưới.
    env_file:
      - ./.env
    environment:
      TS_AUTHKEY: "${RCLONE_MANAGER_TAILSCALE_AUTHKEY:-}"
      TS_USERSPACE: "false"
      TS_SOCKET: "${RCLONE_MANAGER_TAILSCALE_SOCKET:-/tmp/tailscaled.sock}"
      TS_SERVE_CONFIG: /config/serve/serve.json
      TS_EXTRA_ARGS: >-
        --advertise-tags=${RCLONE_MANAGER_TAILSCALE_TAGS:-tag:container}
        --accept-dns=${RCLONE_MANAGER_TAILSCALE_ACCEPT_DNS:-false}
        --accept-routes
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - ${RCLONE_MANAGER_DOCKER_VOLUMES_ROOT:-./.docker-volumes}/tailscale/var-lib:/var/lib/tailscale
      - ./tailscale:/config/serve
      - tailscale-socket:/tmp
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    network_mode: host
    restart: unless-stopped

  # ── Tailscale: Windows/WSL2 userspace mode ─────────────────────
  tailscale-windows:
    profiles: [tailscale-windows]
    image: tailscale/tailscale:stable
    container_name: "ts-windows"
    hostname: "${RCLONE_MANAGER_PROJECT_NAME_TAILSCALE:-${RCLONE_MANAGER_PROJECT_NAME:-myapp}}"
    depends_on:
      tailscale-keep-ip-prepare-windows:
        condition: service_completed_successfully
    # Compose vẫn ưu tiên giá trị khai báo explicit trong environment bên dưới.
    env_file:
      - ./.env
    environment:
      TS_AUTHKEY: "${RCLONE_MANAGER_TAILSCALE_AUTHKEY:-}"
      TS_USERSPACE: "true"
      TS_SOCKET: "${RCLONE_MANAGER_TAILSCALE_SOCKET:-/tmp/tailscaled.sock}"
      TS_SERVE_CONFIG: /config/serve/serve.json
      TS_EXTRA_ARGS: >-
        --advertise-tags=${RCLONE_MANAGER_TAILSCALE_TAGS:-tag:container}
        --accept-dns=${RCLONE_MANAGER_TAILSCALE_ACCEPT_DNS:-false}
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - ${RCLONE_MANAGER_DOCKER_VOLUMES_ROOT:-./.docker-volumes}/tailscale/var-lib:/var/lib/tailscale
      - ./tailscale:/config/serve
      - tailscale-socket:/tmp
    networks: [app_net]
    restart: unless-stopped

  # ── Watchdog (Linux profile): monitor tailscale status/log only ───────
  tailscale-watchdog-linux:
    profiles: [tailscale-linux]
    container_name: "ts-watchdog-linux"
    build:
      context: .
      dockerfile: tailscale/Dockerfile.watchdog
    depends_on:
      tailscale-linux:
        condition: service_started
    command: ["node", "/workspace/tailscale/tailscale-watchdog.js"]
    # Compose vẫn ưu tiên giá trị khai báo explicit trong environment bên dưới.
    env_file:
      - ./.env
    environment:
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_MODE: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_MODE:-heal}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_INTERVAL_SEC: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_INTERVAL_SEC:-30}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_ALERT_EVERY: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_ALERT_EVERY:-5}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_LOG_OK_EVERY: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_LOG_OK_EVERY:-10}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_NETCHECK: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_NETCHECK:-true}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_RECONNECT_MIN_SEC: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_RECONNECT_MIN_SEC:-60}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_HEAL_AFTER_STREAK: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_HEAL_AFTER_STREAK:-2}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_UP_ACCEPT_DNS: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_UP_ACCEPT_DNS:-false}"
      # Sidecar cannot safely inspect tailscale container resolv.conf; use health/netcheck instead.
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_DNS_CHECK: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_DNS_CHECK:-false}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_AUTO_RECONNECT: "true"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_DNS_FIX: "false"
      RCLONE_MANAGER_TAILSCALE_SOCKET: "${RCLONE_MANAGER_TAILSCALE_SOCKET:-/tmp/tailscaled.sock}"
      RCLONE_MANAGER_PROJECT_NAME: "${RCLONE_MANAGER_PROJECT_NAME_TAILSCALE:-${RCLONE_MANAGER_PROJECT_NAME:-myapp}}"
    user: "0:0"
    volumes:
      - ./tailscale:/workspace/tailscale:ro
      - tailscale-socket:/tmp
    networks: [app_net]
    restart: unless-stopped

  # ── Watchdog (Windows profile): monitor tailscale status/log only ─────
  tailscale-watchdog-windows:
    profiles: [tailscale-windows]
    container_name: "ts-watchdog-windows"
    build:
      context: .
      dockerfile: tailscale/Dockerfile.watchdog
    depends_on:
      tailscale-windows:
        condition: service_started
    command: ["node", "/workspace/tailscale/tailscale-watchdog.js"]
    # Compose vẫn ưu tiên giá trị khai báo explicit trong environment bên dưới.
    env_file:
      - ./.env
    environment:
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_MODE: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_MODE:-heal}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_INTERVAL_SEC: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_INTERVAL_SEC:-30}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_ALERT_EVERY: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_ALERT_EVERY:-5}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_LOG_OK_EVERY: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_LOG_OK_EVERY:-10}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_NETCHECK: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_NETCHECK:-true}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_RECONNECT_MIN_SEC: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_RECONNECT_MIN_SEC:-60}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_HEAL_AFTER_STREAK: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_HEAL_AFTER_STREAK:-2}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_UP_ACCEPT_DNS: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_UP_ACCEPT_DNS:-false}"
      # Sidecar cannot safely inspect tailscale container resolv.conf; use health/netcheck instead.
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_DNS_CHECK: "${RCLONE_MANAGER_TAILSCALE_WATCHDOG_DNS_CHECK:-false}"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_AUTO_RECONNECT: "true"
      RCLONE_MANAGER_TAILSCALE_WATCHDOG_DNS_FIX: "false"
      RCLONE_MANAGER_TAILSCALE_SOCKET: "${RCLONE_MANAGER_TAILSCALE_SOCKET:-/tmp/tailscaled.sock}"
      RCLONE_MANAGER_PROJECT_NAME: "${RCLONE_MANAGER_PROJECT_NAME_TAILSCALE:-${RCLONE_MANAGER_PROJECT_NAME:-myapp}}"
    user: "0:0"
    volumes:
      - ./tailscale:/workspace/tailscale:ro
      - tailscale-socket:/tmp
    networks: [app_net]
    restart: unless-stopped

  # ── Keep IP backup loop (Linux profile): upload state periodically ─────
  tailscale-keep-ip-backup-linux:
    container_name: "ts-keep-ip-backup-linux"
    profiles: [tailscale-linux]
    image: node:20-alpine
    depends_on:
      tailscale-linux:
        condition: service_started
    command: ["node", "/workspace/tailscale/tailscale-keep-ip.js", "backup-loop"]
    # Compose vẫn ưu tiên giá trị khai báo explicit trong environment bên dưới.
    env_file:
      - ./.env
    environment:
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_ENABLE: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_ENABLE:-false}"
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_FIREBASE_URL: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_FIREBASE_URL:-}"
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_STATE_FILE: /var/lib/tailscale/tailscaled.state
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_CERTS_DIR: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_CERTS_DIR:-/var/lib/tailscale/certs}"
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_INTERVAL_SEC: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_INTERVAL_SEC:-30}"
      RCLONE_MANAGER_PROJECT_NAME: "${RCLONE_MANAGER_PROJECT_NAME_TAILSCALE:-${RCLONE_MANAGER_PROJECT_NAME:-myapp}}"
      RCLONE_MANAGER_TAILSCALE_TS_TAILNET: "${RCLONE_MANAGER_TAILSCALE_TS_TAILNET:--}"
    user: "0:0"
    volumes:
      - ${RCLONE_MANAGER_DOCKER_VOLUMES_ROOT:-./.docker-volumes}/tailscale/var-lib:/var/lib/tailscale
      - ./tailscale:/workspace/tailscale
    networks: [app_net]
    restart: unless-stopped

  # ── Keep IP backup loop (Windows profile): upload state periodically ───
  tailscale-keep-ip-backup-windows:
    container_name: "ts-keep-ip-backup-windows"
    profiles: [tailscale-windows]
    image: node:20-alpine
    depends_on:
      tailscale-windows:
        condition: service_started
    command: ["node", "/workspace/tailscale/tailscale-keep-ip.js", "backup-loop"]
    # Compose vẫn ưu tiên giá trị khai báo explicit trong environment bên dưới.
    env_file:
      - ./.env
    environment:
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_ENABLE: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_ENABLE:-false}"
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_FIREBASE_URL: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_FIREBASE_URL:-}"
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_STATE_FILE: /var/lib/tailscale/tailscaled.state
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_CERTS_DIR: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_CERTS_DIR:-/var/lib/tailscale/certs}"
      RCLONE_MANAGER_TAILSCALE_KEEP_IP_INTERVAL_SEC: "${RCLONE_MANAGER_TAILSCALE_KEEP_IP_INTERVAL_SEC:-30}"
      RCLONE_MANAGER_PROJECT_NAME: "${RCLONE_MANAGER_PROJECT_NAME_TAILSCALE:-${RCLONE_MANAGER_PROJECT_NAME:-myapp}}"
      RCLONE_MANAGER_TAILSCALE_TS_TAILNET: "${RCLONE_MANAGER_TAILSCALE_TS_TAILNET:--}"
    user: "0:0"
    volumes:
      - ${RCLONE_MANAGER_DOCKER_VOLUMES_ROOT:-./.docker-volumes}/tailscale/var-lib:/var/lib/tailscale
      - ./tailscale:/workspace/tailscale
    networks: [app_net]
    restart: unless-stopped

volumes:
  tailscale-socket:
